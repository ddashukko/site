<title>Тест: Звичайні дроби</title>
<style>
* { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
body { background-color: #f0f4f8; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; color: #333; }
.app-container { background: #fff; width: 100%; max-width: 700px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); padding: 30px; overflow: hidden; }
header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 2px solid #e2e8f0; }
h1 { font-size: 1.5rem; margin: 0; color: #2c3e50; }
.progress { font-weight: bold; color: #3498db; }
.svg-container { display: flex; justify-content: center; align-items: center; background: #f8fafc; border: 2px dashed #cbd5e1; border-radius: 8px; padding: 20px; margin-bottom: 20px; min-height: 200px; }
svg { max-width: 220px; max-height: 220px; width: 100%; height: auto; }
.question-text { font-size: 1.2rem; margin-bottom: 20px; font-weight: 500; }
.options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
button { padding: 15px; font-size: 1.1rem; border: 2px solid #e2e8f0; background: #fff; border-radius: 8px; cursor: pointer; transition: all 0.2s; font-weight: bold; color: #475569; }
button:hover:not(:disabled) { border-color: #3498db; color: #3498db; background: #f0f8ff; }
button:disabled { cursor: not-allowed; opacity: 0.8; }
button.correct { background: #2ecc71 !important; border-color: #2ecc71 !important; color: #fff !important; }
button.wrong { background: #e74c3c !important; border-color: #e74c3c !important; color: #fff !important; }
.action-btn { grid-column: span 2; background: #3498db; color: #fff; border: none; padding: 15px; font-size: 1.2rem; border-radius: 8px; margin-top: 20px; cursor: pointer; transition: background 0.3s; display: none; }
.action-btn:hover { background: #2980b9; }
.result-screen { text-align: center; display: none; }
.score-text { font-size: 2rem; font-weight: bold; color: #2c3e50; margin: 20px 0; }
</style>
</head>
<body>

<div class="app-container">
    <div id="quiz-screen">
        <header>
            <h1>Тестування: Дроби (5 клас)</h1>
            <div class="progress"><span id="current-q">1</span> / <span id="total-q">35</span></div>
        </header>
        <div class="question-text" id="question-text"></div>
        <div class="svg-container" id="svg-container"></div>
        <div class="options-grid" id="options-container"></div>
        <button class="action-btn" id="next-btn">Наступне питання</button>
    </div>

    <div id="result-screen" class="result-screen">
        <h1>Тест завершено!</h1>
        <div class="score-text">Твій результат: <span id="score-display">0</span> з <span id="total-score">35</span></div>
        <button class="action-btn" id="restart-btn" style="display: block; margin: 0 auto;">Пройти ще раз</button>
    </div>
</div>

let currentQuestionIndex = 0;
let score = 0;

const questionText = document.getElementById('question-text');
const svgContainer = document.getElementById('svg-container');
const optionsContainer = document.getElementById('options-container');
const currentQSpan = document.getElementById('current-q');
const totalQSpan = document.getElementById('total-q');
const nextBtn = document.getElementById('next-btn');
const quizScreen = document.getElementById('quiz-screen');
const resultScreen = document.getElementById('result-screen');
const scoreDisplay = document.getElementById('score-display');
const totalScoreDisplay = document.getElementById('total-score');
const restartBtn = document.getElementById('restart-btn');

function initQuiz() {
    currentQuestionIndex = 0;
    score = 0;
    totalQSpan.textContent = quizData.length;
    totalScoreDisplay.textContent = quizData.length;
    quizScreen.style.display = 'block';
    resultScreen.style.display = 'none';
    loadQuestion();
}

function loadQuestion() {
    nextBtn.style.display = 'none';
    const currentQuiz = quizData[currentQuestionIndex];
    currentQSpan.textContent = currentQuestionIndex + 1;
    questionText.textContent = currentQuiz.q;
    svgContainer.innerHTML = currentQuiz.svg;
    optionsContainer.innerHTML = '';

    currentQuiz.options.forEach((option, index) => {
        const button = document.createElement('button');
        button.textContent = option;
        button.addEventListener('click', () => selectAnswer(button, index));
        optionsContainer.appendChild(button);
    });
}

function selectAnswer(selectedButton, selectedIndex) {
    const currentQuiz = quizData[currentQuestionIndex];
    const allButtons = optionsContainer.querySelectorAll('button');
    
    allButtons.forEach(btn => btn.disabled = true);

    if (selectedIndex === currentQuiz.correct) {
        selectedButton.classList.add('correct');
        score++;
    } else {
        selectedButton.classList.add('wrong');
        allButtons[currentQuiz.correct].classList.add('correct');
    }

    nextBtn.style.display = 'block';
}

nextBtn.addEventListener('click', () => {
    currentQuestionIndex++;
    if (currentQuestionIndex < quizData.length) {
        loadQuestion();
    } else {
        showResults();
    }
});

function showResults() {
    quizScreen.style.display = 'none';
    resultScreen.style.display = 'block';
    scoreDisplay.textContent = score;
}

restartBtn.addEventListener('click', initQuiz);

initQuiz();
</script>

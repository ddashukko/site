<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Оновлення теми уроку</title>
    <style>
      body {
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          sans-serif;
        background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        min-height: 100vh;
      }

      .container {
        width: 95%;
        max-width: 750px;
        margin: 30px auto;
        background: #ffffff;
        padding: 15px;
        border-radius: 20px;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
        overflow: hidden;
      }

      h2 {
        text-align: center;
        color: #2d3436;
        font-size: 1.5rem;
        margin-top: 10px;
        margin-bottom: 25px;
        font-weight: 600;
      }

      /* Стилізація самого фрейму */
      iframe {
        width: 100%;
        border: none;
        min-height: 1050px;
        border-radius: 10px;
      }

      /* Адаптивність для мобільних пристроїв */
      @media (max-width: 600px) {
        .container {
          margin: 10px;
          width: calc(100% - 20px);
          padding: 10px;
        }
        h2 {
          font-size: 1.2rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <iframe
        src="https://docs.google.com/forms/d/e/1FAIpQLSfGmeyZqguqzLf10BYbzRFF49XvGHg4MIxsgWns555h5STnng/viewform?embedded=true"
        width="100%"
        height="1026"
        frameborder="0"
        marginheight="0"
        marginwidth="0"
      >
        Завантаження…
      </iframe>
    </div>
  </body>
</html>

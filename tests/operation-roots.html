<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Operation Root Access | Class 8</title>
    <style>
      :root {
        --bg-color: #0d1117;
        --terminal-green: #00ff41;
        --terminal-dim: #008f11;
        --error-red: #ff3333;
        --font-stack: "Courier New", Courier, monospace;
      }

      body {
        background-color: var(--bg-color);
        color: var(--terminal-green);
        font-family: var(--font-stack);
        margin: 0;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        user-select: none;
      }

      .container {
        width: 100%;
        max-width: 900px;
      }

      header {
        text-align: center;
        border-bottom: 2px solid var(--terminal-dim);
        padding-bottom: 20px;
        margin-bottom: 20px;
      }

      h1 {
        text-transform: uppercase;
        letter-spacing: 2px;
        text-shadow: 0 0 10px var(--terminal-dim);
        margin: 10px 0;
      }

      .subtitle {
        font-size: 0.9em;
        color: var(--terminal-dim);
      }

      .status-bar {
        display: flex;
        justify-content: space-between;
        margin-bottom: 20px;
        font-weight: bold;
        background: rgba(0, 255, 65, 0.05);
        padding: 10px;
        border-radius: 5px;
      }

      .level-selector {
        display: flex;
        gap: 10px;
        margin-bottom: 30px;
        justify-content: center;
        flex-wrap: wrap;
      }

      .level-btn {
        background: transparent;
        border: 1px solid var(--terminal-green);
        color: var(--terminal-green);
        padding: 10px 15px;
        cursor: pointer;
        font-family: var(--font-stack);
        transition: all 0.3s;
        text-transform: uppercase;
        font-size: 0.9em;
      }

      .level-btn:hover,
      .level-btn.active {
        background: var(--terminal-green);
        color: var(--bg-color);
        box-shadow: 0 0 15px var(--terminal-dim);
      }

      .terminal-window {
        border: 1px solid var(--terminal-dim);
        padding: 30px;
        background: rgba(0, 20, 0, 0.6);
        min-height: 300px;
        position: relative;
        box-shadow: 0 0 20px rgba(0, 255, 65, 0.1);
      }

      .equation-display {
        font-size: 2.5em;
        margin: 30px 0;
        text-align: center;
        text-shadow: 0 0 5px var(--terminal-green);
      }

      .input-group {
        display: flex;
        gap: 10px;
        justify-content: center;
        align-items: center;
      }

      input[type="text"] {
        background: transparent;
        border: none;
        border-bottom: 2px solid var(--terminal-green);
        color: var(--terminal-green);
        font-family: var(--font-stack);
        font-size: 1.5em;
        text-align: center;
        width: 200px;
        outline: none;
        padding: 5px;
      }

      input[type="text"]:disabled {
        border-bottom: 2px solid var(--terminal-dim);
        color: var(--terminal-dim);
      }

      button.submit-btn {
        background: var(--terminal-green);
        color: var(--bg-color);
        border: none;
        padding: 10px 20px;
        font-family: var(--font-stack);
        font-weight: bold;
        cursor: pointer;
        font-size: 1.1em;
      }

      button.submit-btn:disabled {
        background: var(--terminal-dim);
        cursor: not-allowed;
      }

      .feedback {
        height: 30px;
        text-align: center;
        margin-top: 20px;
        font-weight: bold;
        font-size: 1.1em;
      }

      .feedback.success {
        color: var(--terminal-green);
        text-shadow: 0 0 5px var(--terminal-green);
      }
      .feedback.error {
        color: var(--error-red);
        text-shadow: 0 0 5px var(--error-red);
      }

      .nav-buttons {
        display: flex;
        justify-content: space-between;
        margin-top: 40px;
      }

      .progress-container {
        margin-top: 30px;
      }

      .progress-bar {
        width: 100%;
        height: 12px;
        background: #222;
        border: 1px solid var(--terminal-dim);
      }

      .progress-fill {
        height: 100%;
        background: var(--terminal-green);
        width: 0%;
        transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 0 10px var(--terminal-green);
      }

      .hint {
        font-size: 0.8em;
        color: #666;
        text-align: center;
        margin-top: 10px;
      }

      /* Shake animation for error */
      @keyframes shake {
        0% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-5px);
        }
        50% {
          transform: translateX(5px);
        }
        75% {
          transform: translateX(-5px);
        }
        100% {
          transform: translateX(0);
        }
      }
      .shake {
        animation: shake 0.4s ease-in-out;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Operation Root Access</h1>
        <div class="subtitle">
          Secure Mainframe // Authorized Personnel Only
        </div>
        <div style="margin-top: 10px">
          SYSTEM STATUS:
          <span id="system-status" style="color: var(--error-red)">LOCKED</span>
        </div>
      </header>

      <div class="level-selector">
        <button class="level-btn active" onclick="setLevel(1)">
          Level 1: The Gate
        </button>
        <button class="level-btn" onclick="setLevel(2)">
          Level 2: Firewall
        </button>
        <button class="level-btn" onclick="setLevel(3)">
          Level 3: The Core
        </button>
        <button class="level-btn" onclick="setLevel(4)">
          Level 4: Override
        </button>
        <button class="level-btn" onclick="setLevel(5)">
          Level 5: Logic Traps
        </button>
      </div>

      <div class="status-bar">
        <span
          >Current Sector: <span id="current-index">1</span> /
          <span id="total-count">15</span></span
        >
        <span>Data Decrypted: <span id="score">0</span> / 75</span>
      </div>

      <div class="terminal-window">
        <div id="game-area"></div>

        <div class="feedback" id="feedback-msg"></div>

        <div class="nav-buttons">
          <button class="level-btn" onclick="prevEq()">PREVIOUS</button>
          <button class="level-btn" onclick="nextEq()">NEXT</button>
        </div>
      </div>

      <div class="progress-container">
        <div>
          GLOBAL DECRYPTION PROGRESS: <span id="percent-display">0%</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progress"></div>
        </div>
      </div>
    </div>

    <script>
      // --- DATA REPOSITORY ---
      const levels = {
        1: [
          { id: 1, q: "√x = 5", a: ["25"] },
          { id: 2, q: "√x = 1", a: ["1"] },
          { id: 3, q: "√x = 0", a: ["0"] },
          { id: 4, q: "√x = 12", a: ["144"] },
          { id: 5, q: "√x = 20", a: ["400"] },
          { id: 6, q: "√y = 0.3", a: ["0.09", ".09"] },
          { id: 7, q: "√a = 0.5", a: ["0.25", ".25"] },
          {
            id: 8,
            q: "√x = -9",
            a: ["no solution", "none", "no", "impossible", "empty set"],
          },
          { id: 9, q: "x² = 36", a: ["6, -6", "-6, 6", "±6", "+-6"] },
          { id: 10, q: "x² = 100", a: ["10, -10", "-10, 10", "±10", "+-10"] },
          { id: 11, q: "x² = 0", a: ["0"] },
          { id: 12, q: "x² = 1", a: ["1, -1", "-1, 1", "±1", "+-1"] },
          { id: 13, q: "√x = 11", a: ["121"] },
          {
            id: 14,
            q: "x² = -4",
            a: ["no solution", "none", "no", "impossible"],
          },
          { id: 15, q: "√x = 1.5", a: ["2.25"] },
        ],
        2: [
          { id: 16, q: "3√x = 21", a: ["49"] },
          { id: 17, q: "2√x = 10", a: ["25"] },
          { id: 18, q: "¼√x = 2", a: ["64"] },
          { id: 19, q: "5√x = 1", a: ["0.04", "1/25", ".04"] },
          { id: 20, q: "√x - 7 = 0", a: ["49"] },
          { id: 21, q: "√x + 4 = 13", a: ["81"] },
          { id: 22, q: "10 - √x = 4", a: ["36"] },
          { id: 23, q: "0.2√x = 4", a: ["400"] },
          { id: 24, q: "4√x + 3 = 19", a: ["16"] },
          { id: 25, q: "2√x - 6 = 8", a: ["49"] },
          { id: 26, q: "⅔√x = 6", a: ["81"] },
          { id: 27, q: "6√x + 5 = 5", a: ["0"] },
          { id: 28, q: "3√x + 15 = 0", a: ["no solution", "none", "no"] },
          { id: 29, q: "0.5√x - 1 = 3", a: ["64"] },
          { id: 30, q: "7√x = 0", a: ["0"] },
        ],
        3: [
          { id: 31, q: "√(x - 3) = 5", a: ["28"] },
          { id: 32, q: "√(x + 7) = 4", a: ["9"] },
          { id: 33, q: "√(2x) = 8", a: ["32"] },
          { id: 34, q: "√(5x) = 1", a: ["0.2", "1/5", ".2"] },
          { id: 35, q: "√(3x - 2) = 4", a: ["6"] },
          { id: 36, q: "√(10 - x) = 3", a: ["1"] },
          { id: 37, q: "√(2x + 1) = 9", a: ["40"] },
          { id: 38, q: "√(4 - 2x) = 2", a: ["0"] },
          { id: 39, q: "√(x/3) = 2", a: ["12"] },
          { id: 40, q: "2√(x+1) = 10", a: ["24"] },
          { id: 41, q: "3√(2x-1) = 15", a: ["13"] },
          { id: 42, q: "√(x² - 16) = 0", a: ["4, -4", "-4, 4", "±4"] },
          { id: 43, q: "√(x² + 5) = 3", a: ["2, -2", "-2, 2", "±2"] },
          { id: 44, q: "√(0.1x + 2) = 4", a: ["140"] },
          { id: 45, q: "½√(4x-4) = 2", a: ["5"] },
        ],
        4: [
          { id: 46, q: "√x² = 8", a: ["8, -8", "-8, 8", "±8"] },
          { id: 47, q: "√x² = 0", a: ["0"] },
          { id: 48, q: "√x² = -2", a: ["no solution", "none", "no"] },
          { id: 49, q: "(√x)² = 49", a: ["49"] },
          { id: 50, q: "2(√x)² = 18", a: ["9"] },
          { id: 51, q: "√x · √x = 25", a: ["25"] },
          { id: 52, q: "√(5 + √x) = 3", a: ["16"] },
          { id: 53, q: "√(2 + √(x-1)) = 2", a: ["5"] },
          { id: 54, q: "√(x-5)² = 3", a: ["8, 2", "2, 8"] },
          { id: 55, q: "√(x² - 6x + 9) = 4", a: ["7, -1", "-1, 7"] },
          { id: 56, q: "x² = 7", a: ["√7, -√7", "sqrt(7), -sqrt(7)", "±√7"] },
          {
            id: 57,
            q: "x² - 13 = 0",
            a: ["√13, -√13", "sqrt(13), -sqrt(13)", "±√13"],
          },
          { id: 58, q: "√x = 2x", a: ["0, 0.25", "0, 1/4"] },
          { id: 59, q: "√x + √9x = 8", a: ["4"] },
          { id: 60, q: "√16x - 2√x = 6", a: ["9"] },
        ],
        5: [
          { id: 61, q: "√√x = 2", a: ["16"] },
          { id: 62, q: "5/√x = √x", a: ["5"] },
          { id: 63, q: "√x = √100 - √36", a: ["16"] },
          { id: 64, q: "√x = √(100 - 36)", a: ["64"] },
          { id: 65, q: "x² = √81", a: ["3, -3", "-3, 3", "±3"] },
          { id: 66, q: "√(2x) = √(x + 5)", a: ["5"] },
          { id: 67, q: "(√x - 2)(√x + 5) = 0", a: ["4"] },
          { id: 68, q: "√x = 2√3", a: ["12"] },
          { id: 69, q: "√(-4)² = x", a: ["4"] },
          { id: 70, q: "√x⁴ = 81", a: ["9, -9", "-9, 9", "±9"] },
          { id: 71, q: "√x = x", a: ["0, 1", "1, 0", "0,1", "1,0"] },
          { id: 72, q: "√x + √x + √x = 6", a: ["4"] },
          { id: 73, q: "2√x = √32", a: ["8"] },
          { id: 74, q: "√|x| = 2", a: ["4, -4", "-4, 4", "±4"] },
          { id: 75, q: "√x = -x", a: ["0"] },
        ],
      };

      // --- GAME STATE ---
      let currentLevel = 1;
      let currentIndex = 0;
      let solved = new Set();
      const TOTAL_QUESTIONS = 75;

      // --- FUNCTIONS ---
      function init() {
        renderLevel();
      }

      function setLevel(lvl) {
        currentLevel = lvl;
        currentIndex = 0;

        // Update tabs styling
        document
          .querySelectorAll(".level-btn")
          .forEach((btn) => btn.classList.remove("active"));
        document
          .querySelectorAll(".level-btn")
          [lvl - 1].classList.add("active");

        renderLevel();
      }

      function renderLevel() {
        const area = document.getElementById("game-area");
        area.innerHTML = "";

        const eqs = levels[currentLevel];
        const eq = eqs[currentIndex];

        // Update Status Bar
        document.getElementById("total-count").innerText = eqs.length;
        document.getElementById("current-index").innerText = currentIndex + 1;

        // Create Card
        const card = document.createElement("div");
        card.innerHTML = `
            <div class="equation-display">${eq.q}</div>
            <div class="input-group">
                <input type="text" id="ans-${eq.id}" placeholder="x = ?" autocomplete="off" onkeypress="handleEnter(event, ${eq.id})">
                <button class="submit-btn" onclick="checkAnswer(${eq.id})">EXECUTE</button>
            </div>
            <div class="hint">Multiple answers? Use comma (e.g., "5, -5"). No answer? Type "no".</div>
        `;
        area.appendChild(card);

        // Reset Feedback Area
        const feedback = document.getElementById("feedback-msg");
        feedback.innerText = "";
        feedback.className = "feedback";

        // Focus Input or Disable if solved
        const input = document.getElementById(`ans-${eq.id}`);
        if (solved.has(eq.id)) {
          input.disabled = true;
          input.value = "ACCESS GRANTED";
          input.style.borderBottomColor = "var(--terminal-dim)";
          document.querySelector(".submit-btn").disabled = true;
          document.querySelector(".submit-btn").innerText = "DONE";
          feedback.innerText = ">> NODE ALREADY HACKED";
          feedback.className = "feedback success";
        } else {
          input.focus();
        }
      }

      function handleEnter(e, id) {
        if (e.key === "Enter") {
          checkAnswer(id);
        }
      }

      function checkAnswer(id) {
        const input = document.getElementById(`ans-${id}`);
        const val = input.value.trim().toLowerCase();
        const eq = levels[currentLevel][currentIndex];
        const feedback = document.getElementById("feedback-msg");

        if (!val) return;

        // Validation Logic
        let isCorrect = false;

        // Check direct match or stripped spaces match
        if (eq.a.some((ans) => ans.toLowerCase() === val)) {
          isCorrect = true;
        } else {
          const cleanVal = val.replace(/\s/g, ""); // Remove all spaces
          if (
            eq.a.some(
              (ans) => ans.replace(/\s/g, "").toLowerCase() === cleanVal,
            )
          ) {
            isCorrect = true;
          }
        }

        if (isCorrect) {
          feedback.innerText = ">> SUCCESS: ENCRYPTION BROKEN";
          feedback.className = "feedback success";
          input.disabled = true;
          document.querySelector(".submit-btn").disabled = true;

          if (!solved.has(id)) {
            solved.add(id);
            updateProgress();
          }

          // Auto-advance
          setTimeout(() => {
            if (currentIndex < levels[currentLevel].length - 1) {
              nextEq();
            } else {
              feedback.innerText = ">> SECTOR CLEARED. PROCEED TO NEXT LEVEL.";
            }
          }, 1000);
        } else {
          feedback.innerText = ">> ERROR: INCORRECT KEY";
          feedback.className = "feedback error";
          input.value = "";
          input.classList.add("shake");
          setTimeout(() => input.classList.remove("shake"), 500);
        }
      }

      function nextEq() {
        if (currentIndex < levels[currentLevel].length - 1) {
          currentIndex++;
          renderLevel();
        }
      }

      function prevEq() {
        if (currentIndex > 0) {
          currentIndex--;
          renderLevel();
        }
      }

      function updateProgress() {
        const count = solved.size;
        document.getElementById("score").innerText = count;

        const percentage = Math.floor((count / TOTAL_QUESTIONS) * 100);
        document.getElementById("progress").style.width = percentage + "%";
        document.getElementById("percent-display").innerText = percentage + "%";

        if (percentage === 100) {
          document.getElementById("system-status").innerText =
            "SYSTEM UNLOCKED";
          document.getElementById("system-status").style.color =
            "var(--terminal-green)";
          document.getElementById("system-status").style.textShadow =
            "0 0 10px var(--terminal-green)";
          confettiEffect(); // Optional visual reward could go here
        }
      }

      init();
    </script>
  </body>
</html>
